name: AgenRACI validate
description: RACI accountability charter checker for human + AI-agent teams — runs rules R1-R6 and fails CI on any gap.
author: AgenRACI contributors
branding:
  icon: check-circle
  color: purple

inputs:
  charter:
    description: Path or shell glob of the charter file(s) to validate.
    required: false
    default: charter.yaml
  python-version:
    description: Python version to run the checker on.
    required: false
    default: "3.12"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install AgenRACI
      shell: bash
      # Install from the action's own pinned checkout, so the checker version
      # always matches the `uses: jing-ny/agenraci@<ref>` you pinned.
      run: pip install "${{ github.action_path }}"

    - name: Validate charter(s)
      shell: bash
      # Pass the input through the environment, never interpolate it straight
      # into the script — otherwise a caller who wires PR-controlled data into
      # `charter` could inject shell commands.
      env:
        CHARTER: ${{ inputs.charter }}
      run: |
        shopt -s nullglob
        # Word-split + glob the space-separated pattern list on purpose.
        files=( $CHARTER )
        if [ ${#files[@]} -eq 0 ]; then
          echo "::error::no charter files matched '$CHARTER'"
          exit 1
        fi
        agenraci validate --format github "${files[@]}"
