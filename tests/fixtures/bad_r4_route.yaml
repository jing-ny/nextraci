# Trips R4 only (suggestion_route arm): do_work consults `reviewer`, which is
# denied `edit_code` (the capability do_work touches), but declares no
# suggestion_route — so its input is silently dropped. R4 has two arms — missing
# break_glass on a gate (see bad_r4.yaml) and this missing-route case.
project: test-bad-r4-route

roles: [orchestrator, engineer, reviewer, monitor]

members:
  - { name: you,   type: human, role: orchestrator }
  - { name: dev,   type: human, role: engineer }
  - { name: vera,  type: agent, role: reviewer, model: claude-opus-4-8 }
  - { name: pulse, type: agent, role: monitor,  model: claude-haiku-4-5 }

capabilities:
  engineer: { grant: [edit_code, merge] }
  reviewer: { grant: [block_merge], deny: [edit_code] }
  monitor:  { grant: [read_analytics] }

actions:

  do_work:
    responsible: engineer
    accountable: engineer
    consulted:   [reviewer]             # ← reviewer denied edit_code, but...
    capabilities: [edit_code]
    # ← R4: no suggestion_route, so the denied-but-consulted input has nowhere to go

  merge:
    responsible: engineer
    accountable: reviewer
    capabilities: [merge, block_merge]
    gate:
      approver: reviewer
      on_timeout: block
      break_glass: { who: engineer, condition: sev1, requires_after_review: true }

  watch:
    responsible: monitor
    accountable: orchestrator
    capabilities: [read_analytics]
    low_risk: true
    gate:
      approver: orchestrator
      on_timeout: proceed_if_low_risk
      break_glass: { who: orchestrator, condition: alarm, requires_after_review: false }
