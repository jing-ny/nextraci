name: Publish to PyPI

# Fires only when a maintainer pushes a version tag (e.g. v0.1.0). Nothing is
# published on ordinary commits or PRs. See RELEASING.md for the full checklist
# and one-time PyPI Trusted Publishing setup this workflow depends on.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build & check distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify the tag matches the package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python -c 'import tomllib,pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          echo "tag=$tag  pyproject=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag does not match pyproject version $pkg. Bump the version or fix the tag." >&2
            exit 1
          fi

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Trusted Publishing (OIDC): no API token/secret is stored in the repo.
    # The PyPI project must list this repo + the "pypi" environment as a trusted
    # publisher (one-time setup, see RELEASING.md).
    environment:
      name: pypi
      url: https://pypi.org/p/nextraci
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
