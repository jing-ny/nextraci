name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Validate example charters
        run: |
          nextraci validate examples/sprout/charter.yaml
          nextraci validate examples/relay/charter.yaml

      - name: Validate the starter template
        run: nextraci validate templates/charter.template.yaml

      - name: Validate the project's own governance charter
        run: nextraci validate governance/charter.yaml
